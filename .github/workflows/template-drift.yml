---
name: Template drift
on:  # yamllint disable-line rule:truthy
  push:
    branches: ["main"]
    paths:
      - "projects/ores.codegen/library/templates/**"
      - "projects/ores.lisp/src/ores-build-codegen-templates.el"
      - "projects/ores.codegen/scripts/regenerate_facet_inventories.py"

  pull_request:
    branches: ["main"]
    paths:
      - "projects/ores.codegen/library/templates/**"
      - "projects/ores.lisp/src/ores-build-codegen-templates.el"
      - "projects/ores.codegen/scripts/regenerate_facet_inventories.py"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  # The codegen mustache templates are tangled from the literate facet
  # docs in projects/ores.codegen/library/templates/. This job re-runs
  # the tangle and the facet-inventory generator and fails if either
  # produces a diff — i.e. someone edited a .mustache artefact or a
  # group's * Facets table by hand instead of the org source.
  drift:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Emacs
        run: |
          sudo apt-get update
          sudo apt-get install -y emacs-nox
      - name: Tangle templates
        run: |
          emacs -Q --script projects/ores.lisp/src/ores-build-codegen-templates.el
      - name: Check templates match their org sources
        run: |
          git diff --exit-code -- projects/ores.codegen/library/templates
      - name: Check facet inventories are current
        run: |
          python3 projects/ores.codegen/scripts/regenerate_facet_inventories.py --check
