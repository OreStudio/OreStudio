---
name: Library config drift
on:  # yamllint disable-line rule:truthy
  push:
    branches: ["main"]
    paths:
      - "projects/ores.codegen/library/facet_catalogue.org"
      - "projects/ores.codegen/library/component_catalogue.org"
      - "projects/ores.codegen/library/profiles.json"
      - "projects/ores.codegen/library/components.json"
      - "projects/ores.codegen/scripts/generate_profiles.py"
      - "projects/ores.codegen/scripts/generate_components.py"

  pull_request:
    branches: ["main"]
    paths:
      - "projects/ores.codegen/library/facet_catalogue.org"
      - "projects/ores.codegen/library/component_catalogue.org"
      - "projects/ores.codegen/library/profiles.json"
      - "projects/ores.codegen/library/components.json"
      - "projects/ores.codegen/scripts/generate_profiles.py"
      - "projects/ores.codegen/scripts/generate_components.py"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  # profiles.json and components.json are generated artefacts tangled from
  # their org sources. This job re-runs both generators and fails if the
  # committed JSON does not match the org source — i.e. someone edited
  # a generated JSON file by hand instead of its org source.
  drift:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Check profiles.json matches facet_catalogue.org
        run: |
          python3 projects/ores.codegen/scripts/generate_profiles.py --check
      - name: Check components.json matches component_catalogue.org
        run: |
          python3 projects/ores.codegen/scripts/generate_components.py --check
