# yamllint disable rule:line-length
---
name: Continuous MacOS

env:
  VCPKG_BINARY_SOURCES: 'clear;files,${{ github.workspace }}/vcpkg-cache,readwrite'
  SCCACHE_DIR: '${{ github.workspace }}/.sccache'

on:  # yamllint disable-line rule:truthy
  schedule:
    - cron: '0 */3 * * *'
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  guard:
    name: relevance-guard
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Check if code changed since last successful run
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "should_build=true" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            exit 0
          fi
          workflow_file=$(basename "${GITHUB_WORKFLOW_REF%%@*}")
          last_sha=$(gh api \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow_file}/runs?branch=main&status=success&per_page=1" \
            --jq '.workflow_runs[0].head_sha // empty')
          if [[ -z "$last_sha" ]]; then
            echo "No prior successful run — building"
            exit 0
          fi
          if [[ "$last_sha" == "$GITHUB_SHA" ]]; then
            echo "No new commits since last run — skipping"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          non_doc=$(git diff --name-only "$last_sha" "$GITHUB_SHA" \
            | { grep -vE '^(doc/|assets/|\.claude/|\.gemini/|projects/ores\.codegen/)' || true; } \
            | { grep -vE '\.(md|org)$' || true; } \
            | { grep -vE '^projects/([^/]*/)*modeling/' || true; })
          if [[ -n "$non_doc" ]]; then
            echo "Code changes found — building"
          else
            echo "Doc-only changes — skipping"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: guard
    if: needs.guard.outputs.should_build == 'true'
    name: ${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja
    concurrency:
      group: ci-${{github.ref}}-${{github.job}}-${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja
      cancel-in-progress: false
    # TODO: unpin once Qt is upgraded to latest supported version (story D628C0F8); macOS 15 removed
    # AGL.framework which Qt 6.8.x still references in its QtGui link config.
    runs-on: macos-14
    environment: CI
    strategy:
      fail-fast: false
      matrix:
        name: [macos-clang]
        buildtype: [debug, release]
        include:
          - name: macos-clang
            family: macos
            compiler: clang
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - name: Select Xcode 16
        # Xcode 15.4 (macos-14 default) has a broken std::expected destructor
        # constraint (fixed in Xcode 16.0+). Select the newest Xcode 16.x
        # available on the image to get the fixed libc++.
        run: |
          xcode16=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [[ -z "$xcode16" ]]; then
            echo "No Xcode 16.x found — keeping default"
          else
            echo "Selecting $xcode16"
            sudo xcode-select -s "$xcode16"
            xcodebuild -version
          fi

      - name: Restore sccache
        uses: actions/cache/restore@v6
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja

      - name: Ccache for gh actions
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          variant: sccache
          key: ${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja
          max-size: 2000M
          save: false

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          modules: 'qtcharts'
          cache: true

      - name: Generate postgres password
        id: pg_password
        run: |
          PG_PASS="$(openssl rand -base64 24 | tr -dc 'a-zA-Z0-9')"
          echo "admin_password=${PG_PASS}" >> $GITHUB_OUTPUT
          echo "PGPASSWORD=${PG_PASS}" >> $GITHUB_ENV

      - name: Setup postgres
        uses: ikalnytskyi/action-setup-postgres@v8
        with:
          username: postgres
          password: ${{ steps.pg_password.outputs.admin_password }}
          database: oresdb
          port: 5432
          postgres-version: "18"
        id: postgres

      - name: Install pgmq extension
        run: |
          sharedir=$(pg_config --sharedir)
          extdir="${sharedir}/extension"
          pgmq_tmp=$(mktemp -d)
          git clone --depth=1 https://github.com/pgmq/pgmq.git "${pgmq_tmp}/pgmq"
          cd "${pgmq_tmp}/pgmq/pgmq-extension"
          version=$(grep "^default_version" pgmq.control | sed "s/.*= *'//;s/'//")
          cp "sql/pgmq.sql" "sql/pgmq--${version}.sql"
          sudo cp pgmq.control "${extdir}/"
          sudo cp sql/*.sql "${extdir}/"
          echo "pgmq ${version} installed to ${extdir}"

      - name: Init environment
        env:
          ORES_DATABASE_NAME: ores_ci
          PGPASSWORD: ${{ steps.pg_password.outputs.admin_password }}
        run: |
          ./projects/ores.compass/compass.sh --no-deps env configure -y
          grep -v '^[[:space:]]*#' .env | grep -v '^[[:space:]]*$' \
            | grep -v 'ORES_IAM_SERVICE_JWT_PRIVATE_KEY' >> $GITHUB_ENV

      - name: Setup Database
        run: |
          ./projects/ores.compass/compass.sh db recreate -y -D ores_ci

      - name: get-cmake
        uses: lukka/get-cmake@v4.3.4

      - name: Cache vcpkg binary packages
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/vcpkg-cache
          key: vcpkg-${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja-

      - name: run-vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          doNotCache: false

      - name: Run CTest workflow
        run: |
          brew install autoconf automake libtool autoconf-archive nats-server
          export CMAKE_BUILD_PARALLEL_LEVEL=2
          export CTEST_PARALLEL_LEVEL=$(sysctl -n hw.logicalcpu)
          export CTEST_MAX_PARALLELISM=2
          export VCPKG_DISABLE_SYSTEM_PACKAGE_CHECK=1
          export ORES_BUILD_PROVIDER="github"
          export ORES_BUILD_COMMIT="${GITHUB_SHA}"
          export ORES_BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          export ORES_BUILD_TIMESTAMP=`date "+%Y/%m/%d %H:%M:%S"`
          export preset=${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja
          export cmake_args="build_group=Continuous,preset=${preset}"
          ctest -VV --preset ${preset} --script "CTest.cmake,${cmake_args}"

      - name: Delete sccache entry
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method DELETE \
            "/repos/${{ github.repository }}/actions/caches?key=sccache-${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja" \
            || true

      - name: Save sccache
        if: ${{ !cancelled() }}
        uses: actions/cache/save@v6
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja

      - name: Show sccache statistics
        if: always()
        run: sccache --show-stats

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja
          path: ./build/output/${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja/packages/OreStudio-0.0.22-Darwin.dmg
