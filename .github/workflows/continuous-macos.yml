# yamllint disable rule:line-length
---
name: Continuous MacOS

env:
  VCPKG_BINARY_SOURCES: 'clear;files,${{ github.workspace }}/vcpkg-cache,readwrite'

on:  # yamllint disable-line rule:truthy
  push:
    branches:
      - main
    paths-ignore:
      - 'doc/**'
      - '.claude/**'
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build:
    name: ${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja
    concurrency:
      group: ci-${{github.ref}}-${{github.job}}-${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja
      cancel-in-progress: true
    runs-on: macos-latest
    environment: CI
    strategy:
      fail-fast: false
      matrix:
        name: [macos-clang]
        buildtype: [debug, release]
        include:
          - name: macos-clang
            family: macos
            compiler: clang
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          submodules: true

      - name: Ccache for gh actions
        uses: hendrikmuhs/ccache-action@v1.2.20
        with:
          variant: sccache
          key: ${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja
          max-size: 1000M

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          modules: 'qtcharts'
          cache: true

      - name: Generate postgres password
        id: pg_password
        run: |
          PG_PASS="$(openssl rand -base64 24 | tr -dc 'a-zA-Z0-9')"
          echo "admin_password=${PG_PASS}" >> $GITHUB_OUTPUT
          echo "PGPASSWORD=${PG_PASS}" >> $GITHUB_ENV

      - name: Setup postgres
        uses: ikalnytskyi/action-setup-postgres@v8
        with:
          username: postgres
          password: ${{ steps.pg_password.outputs.admin_password }}
          database: oresdb
          port: 5432
          postgres-version: "18"
        id: postgres

      - name: Install pgmq extension
        run: |
          sharedir=$(pg_config --sharedir)
          extdir="${sharedir}/extension"
          pgmq_tmp=$(mktemp -d)
          git clone --depth=1 https://github.com/pgmq/pgmq.git "${pgmq_tmp}/pgmq"
          cd "${pgmq_tmp}/pgmq/pgmq-extension"
          version=$(grep "^default_version" pgmq.control | sed "s/.*= *'//;s/'//")
          cp "sql/pgmq.sql" "sql/pgmq--${version}.sql"
          sudo cp pgmq.control "${extdir}/"
          sudo cp sql/*.sql "${extdir}/"
          echo "pgmq ${version} installed to ${extdir}"

      - name: Init environment
        env:
          ORES_DATABASE_NAME: ores_ci
          PGPASSWORD: ${{ steps.pg_password.outputs.admin_password }}
        run: |
          ./build/scripts/init-environment.sh -y
          grep -v '^[[:space:]]*#' .env | grep -v '^[[:space:]]*$' \
            | grep -v 'ORES_IAM_SERVICE_JWT_PRIVATE_KEY' >> $GITHUB_ENV

      - name: Setup Database
        run: |
          ./projects/ores.sql/recreate_database.sh -y -D ores_ci

      - name: get-cmake
        uses: lukka/get-cmake@v4.2.3

      - name: Cache vcpkg binary packages
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/vcpkg-cache
          key: vcpkg-${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja-

      - name: run-vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          doNotCache: false

      - name: Run CTest workflow
        run: |
          brew install autoconf automake libtool autoconf-archive nats-server
          export CMAKE_BUILD_PARALLEL_LEVEL=$(sysctl -n hw.logicalcpu)
          export CTEST_PARALLEL_LEVEL=$(sysctl -n hw.logicalcpu)
          export VCPKG_DISABLE_SYSTEM_PACKAGE_CHECK=1
          export ORES_BUILD_PROVIDER="github"
          export ORES_BUILD_COMMIT="${GITHUB_SHA}"
          export ORES_BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          export ORES_BUILD_TIMESTAMP=`date "+%Y/%m/%d %H:%M:%S"`
          export preset=${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja
          export cmake_args="build_group=Continuous,preset=${preset}"
          ctest -VV --preset ${preset} --script "CTest.cmake,${cmake_args}"

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: ${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja
          path: ./build/output/${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja/packages/OreStudio-0.0.14-Darwin.dmg
