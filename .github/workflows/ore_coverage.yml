---
name: ORE Domain Roundtrip Check
on:  # yamllint disable-line rule:truthy
  push:
    branches: ["main"]
    paths-ignore:
      - 'doc/**'
      - '.claude/**'
      - 'assets/**'
      - 'projects/ores.codegen/**'
  pull_request:
    branches: ["main"]
    paths-ignore:
      - 'doc/**'
      - '.claude/**'
      - 'assets/**'
      - 'projects/ores.codegen/**'

  workflow_dispatch:

jobs:
  roundtrip:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run ORE domain roundtrip check
        run: python3 scripts/ore_domain_roundtrip_check.py
