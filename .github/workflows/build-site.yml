---
name: Product website
on:  # yamllint disable-line rule:truthy
  push:
    branches: ["main"]

  pull_request:
    branches: ["main"]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # Build the site on every push and pull request. The build fails when the
  # org export cannot resolve a link — for example a story pointing at a task
  # that was never created — so this job is the gate that catches such
  # breakage on the PR, before it can reach main. It does not deploy.
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Emacs
        uses: purcell/setup-emacs@v8.0
        with:
          version: 29.1
      - name: Build site
        run: |
          emacs -Q --script .build-site.el

  # Deploy to GitHub Pages only for pushes to main (and manual runs); never
  # for pull requests. Runs after the build gate has passed.
  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: "pages"
      cancel-in-progress: false
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Emacs
        uses: purcell/setup-emacs@v8.0
        with:
          version: 29.1
      - name: Build site
        run: |
          emacs -Q --script .build-site.el
      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true
      - name: Doxygen
        run: |
          sudo apt-get install graphviz doxygen
          sudo apt-get install fonts-firacode fonts-freefont-ttf
          doxygen --version
          echo "Running Doxygen"
          doxygen build/doxygen/Doxyfile
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: 'build/output/site/OreStudio'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
