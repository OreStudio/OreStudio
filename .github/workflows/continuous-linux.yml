# yamllint disable rule:line-length
---
name: Continuous Linux

env:
  VCPKG_BINARY_SOURCES: 'clear;files,${{ github.workspace }}/vcpkg-cache,readwrite'

on:  # yamllint disable-line rule:truthy
  push:
    branches:
      - main
    paths-ignore:
      - 'doc/**'
      - '.claude/**'
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build:
    name: ${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja
    concurrency:
      group: ci-${{github.ref}}-${{github.job}}-${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja
      cancel-in-progress: true
    runs-on: ubuntu-24.04
    environment: CI
    strategy:
      fail-fast: false
      matrix:
        name: [linux-gcc, linux-clang]
        buildtype: [debug, release]
        include:
          - name: linux-gcc
            family: linux
            compiler: gcc
          - name: linux-clang
            family: linux
            compiler: clang
    steps:
      - name: Free disk space
        run: |
          echo "=== Disk space before cleanup ==="
          df -h
          # Remove large unused tools to free up disk space
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          echo "=== Disk space after cleanup ==="
          df -h

      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Validate SQL Schema
        run: |
          pip install --quiet pystache
          ./projects/ores.sql/utility/validate_schemas.sh

      - name: Install Clang
        uses: KyleMayes/install-llvm-action@v2
        if: ${{ matrix.compiler == 'clang' }}
        with:
          version: "19"
          arch: x64

      - name: Ccache for gh actions
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          variant: sccache
          key: ${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja
          max-size: 2000M

      - name: Install dev packages
        run: ./build/scripts/install_debian_packages.sh

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          modules: 'qtcharts'
          cache: true

      - name: Generate postgres password
        id: pg_password
        run: |
          PG_PASS="$(openssl rand -base64 24 | tr -dc 'a-zA-Z0-9')"
          echo "admin_password=${PG_PASS}" >> $GITHUB_OUTPUT
          echo "PGPASSWORD=${PG_PASS}" >> $GITHUB_ENV

      - name: Install PostgreSQL extensions
        run: |
          ./build/scripts/setup_postgres_extensions.sh --pg-version 18

      - name: Setup postgres
        uses: ikalnytskyi/action-setup-postgres@v8
        with:
          username: postgres
          password: ${{ steps.pg_password.outputs.admin_password }}
          database: oresdb
          port: 5432
          postgres-version: "18"
        id: postgres

      - name: Configure shared_preload_libraries
        run: |
          PGDATA="$RUNNER_TEMP/pgdata"
          echo "shared_preload_libraries = 'pg_cron,timescaledb'" >> "$PGDATA/postgresql.conf"
          pg_ctl restart --pgdata="$PGDATA" --wait

      - name: Init environment
        env:
          ORES_DATABASE_NAME: ores_ci
        run: |
          ./build/scripts/init-environment.sh -y
          grep -v '^[[:space:]]*#' .env | grep -v '^[[:space:]]*$' \
            | grep -v 'ORES_IAM_SERVICE_JWT_PRIVATE_KEY' >> $GITHUB_ENV

      - name: Setup Database
        run: |
          ./projects/ores.sql/recreate_database.sh -y -D ores_ci

      - name: get-cmake
        uses: lukka/get-cmake@v4.3.1

      - name: Cache vcpkg binary packages
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/vcpkg-cache
          key: vcpkg-${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja-

      - name: run-vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          doNotCache: false

      - name: Run CTest workflow
        run: |
          export CMAKE_BUILD_PARALLEL_LEVEL=$(nproc)
          export CTEST_PARALLEL_LEVEL=$(nproc)
          export PATH=${PATH}:/usr/sbin
          export ZIC=1
          export ORES_BUILD_PROVIDER="github"
          export ORES_BUILD_COMMIT="${GITHUB_SHA}"
          export ORES_BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          export ORES_BUILD_TIMESTAMP=`date "+%Y/%m/%d %H:%M:%S"`
          export preset=${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja
          export cmake_args="build_group=Continuous,preset=${preset}"
          if [[ "${{matrix.buildtype}}" == "debug" ]]; then
              cmake_args="${cmake_args},code_coverage=1"
          fi
          ctest -VV --preset ${preset} --script "CTest.cmake,${cmake_args}"

      - name: Show sccache statistics
        if: always()
        run: sccache --show-stats

      - name: Save cmake build cache
        uses: actions/cache/save@v5
        if: always() && matrix.compiler == 'gcc' && matrix.buildtype == 'debug'
        with:
          path: build/output/${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja/projects
          key: cmake-build-${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja-${{ github.sha }}

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja
          path: ./build/output/${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja/packages/orestudio_0.0.17_amd64.deb
