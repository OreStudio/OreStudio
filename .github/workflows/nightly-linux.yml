# yamllint disable rule:line-length
---
name: Nightly Build

env:
  VCPKG_BINARY_SOURCES: 'clear;files,${{ github.workspace }}/vcpkg-cache,readwrite'
  SCCACHE_DIR: '${{ github.workspace }}/.sccache'

on:  # yamllint disable-line rule:truthy
  schedule:
    - cron: '0 0 * * *'

jobs:
  check_changes:
    runs-on: ubuntu-24.04
    name: Check latest main commit
    outputs:
      should_run: ${{ steps.should_run.outputs.should_run }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - name: check latest commit is less than a day
        id: should_run
        continue-on-error: false
        run: |
          export latest_commit="`git log -1 --format='%H'`"
          echo "Latest commit: ${latest_commit}"
          if [[ -z $(git rev-list --after="24 hours" ${latest_commit}) ]]; then
              echo "should_run=false" >> $GITHUB_OUTPUT
          else
              echo "should_run=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: [check_changes]
    if: ${{ needs.check_changes.outputs.should_run != 'false' }}
    name: ${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}
    runs-on: ubuntu-24.04
    environment: CI
    strategy:
      fail-fast: false
      matrix:
        name: [linux-gcc, linux-clang]
        buildtype: [debug]
        include:
          - name: linux-gcc
            family: linux
            compiler: gcc
          - name: linux-clang
            family: linux
            compiler: clang
    steps:
      - name: Free disk space
        run: |
          echo "=== Disk space before cleanup ==="
          df -h
          # Language runtimes and SDKs not needed by this build
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /home/linuxbrew/.linuxbrew
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/share/miniconda
          sudo rm -rf /usr/share/miniconda3
          # Cloud CLIs
          sudo rm -rf /opt/az
          sudo rm -rf /opt/pipx/venvs/azure-cli
          sudo rm -rf /usr/lib/google-cloud-sdk
          sudo rm -rf /usr/share/google-cloud-sdk
          sudo rm -rf /usr/local/share/powershell
          # Browser bundles
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /usr/local/share/chrome_beta
          sudo rm -rf /opt/google/chrome
          # Pre-installed toolchain caches we don't use
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /opt/hostedtoolcache/Ruby
          sudo rm -rf /opt/hostedtoolcache/node
          sudo rm -rf /opt/hostedtoolcache/go
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/lib/node_modules
          # Snap packages
          sudo snap remove lxd 2>/dev/null || true
          sudo rm -rf /var/cache/snapd
          # Docker images
          sudo docker image prune --all --force || true
          # apt cache
          sudo apt-get clean
          echo "=== Disk space after cleanup ==="
          df -h

      - uses: actions/checkout@v7
        with:
          ref: main
          submodules: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Validate SQL Schema
        run: |
          pip install --quiet pystache
          ./projects/ores.sql/utility/validate_schemas.sh

      - name: Install Clang
        uses: KyleMayes/install-llvm-action@v2
        if: ${{ matrix.compiler == 'clang' }}
        with:
          version: "19"
          arch: x64

      - name: Restore sccache
        uses: actions/cache/restore@v6
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          variant: sccache
          key: ${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja
          max-size: 2000M
          save: false

      - name: Install dev packages
        run: ./projects/ores.compass/compass.sh env install-packages --with-valgrind

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          modules: 'qtcharts'
          cache: true

      - name: Generate postgres password
        id: pg_password
        run: |
          PG_PASS="$(openssl rand -base64 24 | tr -dc 'a-zA-Z0-9')"
          echo "admin_password=${PG_PASS}" >> $GITHUB_OUTPUT
          echo "PGPASSWORD=${PG_PASS}" >> $GITHUB_ENV

      - name: Install PostgreSQL extensions
        run: |
          ./build/scripts/setup_postgres_extensions.sh --pg-version 18

      - name: Setup postgres
        uses: ikalnytskyi/action-setup-postgres@v8
        with:
          username: postgres
          password: ${{ steps.pg_password.outputs.admin_password }}
          database: oresdb
          port: 5432
          postgres-version: "18"
          postgres-conf: |
            shared_preload_libraries = 'pg_cron,timescaledb'
          hba-conf: |
            local all all trust
            host all all 0.0.0.0/0 scram-sha-256
        id: postgres

      - name: Init environment
        env:
          ORES_DATABASE_NAME: ores_ci
        run: |
          ./projects/ores.compass/compass.sh --no-deps env configure -y
          grep -v '^[[:space:]]*#' .env | grep -v '^[[:space:]]*$' \
            | grep -v 'ORES_IAM_SERVICE_JWT_PRIVATE_KEY' >> $GITHUB_ENV

      - name: Setup Database
        run: |
          ./projects/ores.compass/compass.sh db recreate -y -D ores_ci

      - name: Get latest CMake
        uses: lukka/get-cmake@v4.3.4

      - name: Cache vcpkg binary packages
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/vcpkg-cache
          key: vcpkg-${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja-

      - name: Run vcpkg
        uses: lukka/run-vcpkg@v11

      - name: Run CTest workflow
        run: |
          export CMAKE_BUILD_PARALLEL_LEVEL=$(nproc)
          export CTEST_PARALLEL_LEVEL=$(nproc)
          export PATH=${PATH}:/usr/sbin
          export ORES_BUILD_PROVIDER="github"
          export ORES_BUILD_COMMIT="${GITHUB_SHA}"
          export ORES_BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          export ORES_BUILD_TIMESTAMP=`date "+%Y/%m/%d %H:%M:%S"`
          export preset=${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja
          export cmake_args="build_group=Nightly,preset=${preset}"
          cmake_args="${cmake_args},code_coverage=1,with_memcheck=1"
          ctest -VV --timeout 12000 --preset ${preset} --script "CTest.cmake,${cmake_args}"

      - name: Delete sccache entry
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method DELETE \
            "/repos/${{ github.repository }}/actions/caches?key=sccache-${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja" \
            || true

      - name: Save sccache
        if: success()
        uses: actions/cache/save@v6
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja

      - name: Show sccache statistics
        if: always()
        run: sccache --show-stats
