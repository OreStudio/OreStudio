---
name: Product website
# Pull requests build the site via pr.yml's site job; this workflow
# covers pushes to main (build + deploy) and manual runs.
on:  # yamllint disable-line rule:truthy
  push:
    branches: ["main"]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # Submit the full documentation build (site + Doxygen) to CDash as the Site
  # group on every push to main — the heavy build the PR link-check defers.
  # Independent of build/deploy below.
  cdash:
    uses: ./.github/workflows/site-cdash.yml
    with:
      with_doxygen: true

  # Build the site on every push to main and hand it to the deploy job as
  # an artifact. The same build runs on doc-class pull requests via pr.yml,
  # which is where broken id-links are caught before they reach main. It
  # does not deploy. Kept as a separate job so the ~5 min Org build runs
  # outside the serialized Pages-deploy concurrency group.
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Emacs
        run: |
          sudo apt-get update
          sudo apt-get install -y emacs-nox
      - name: Build site
        run: |
          emacs -Q --script projects/ores.lisp/src/ores-build-site.el
      - name: Upload site artifact
        uses: actions/upload-artifact@v7
        with:
          name: site
          path: build/output/site/OreStudio
          include-hidden-files: true
          retention-days: 1

  # Deploy to GitHub Pages only for pushes to main (and manual runs); never
  # for pull requests. Reuses the site built by the build job rather than
  # rebuilding it, then layers Doxygen on top and deploys.
  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: "pages"
      cancel-in-progress: false
    runs-on: ubuntu-24.04
    steps:
      # Checkout is still required: Doxygen reads the Doxyfile and the
      # projects/ sources; the built site arrives via the artifact below.
      - name: Checkout
        uses: actions/checkout@v7
      - name: Download site artifact
        uses: actions/download-artifact@v8
        with:
          name: site
          path: build/output/site/OreStudio
      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true
      - name: Doxygen
        run: |
          sudo apt-get install graphviz doxygen
          sudo apt-get install fonts-firacode fonts-freefont-ttf
          doxygen --version
          echo "Running Doxygen"
          doxygen build/doxygen/Doxyfile
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: 'build/output/site/OreStudio'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
