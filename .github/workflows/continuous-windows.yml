# yamllint disable rule:line-length
---
name: Continuous Windows

env:
  VCPKG_BINARY_SOURCES: 'clear;files,${{ github.workspace }}/vcpkg-cache,readwrite'

on:  # yamllint disable-line rule:truthy
  push:
    branches:
      - main
    paths-ignore:
      - 'doc/**'
      - '.claude/**'
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build:
    name: ${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja
    concurrency:
      group: ci-${{github.ref}}-${{github.job}}-${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja
      cancel-in-progress: true
    runs-on: windows-latest
    environment: CI
    strategy:
      fail-fast: false
      matrix:
        name: [windows-msvc, windows-clang]
        buildtype: [debug, release]
        include:
          - name: windows-msvc
            family: windows
            compiler: msvc
          - name: windows-clang
            family: windows
            compiler: clang
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Ccache for gh actions
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          variant: sccache
          key: ${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja
          max-size: 2000M

      - name: Install Clang
        uses: KyleMayes/install-llvm-action@v2
        if: ${{ matrix.compiler == 'clang' }}
        with:
          version: "19"
          arch: x64

      - name: Install NSIS
        if: ${{ matrix.compiler == 'clang' }}
        run: choco install nsis

      - name: Install NATS Server
        run: |
          $version = "v2.10.24"
          $url = "https://github.com/nats-io/nats-server/releases/download/$version/nats-server-$version-windows-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile nats-server.zip
          Expand-Archive -Path nats-server.zip -DestinationPath "$env:ProgramFiles\nats-server" -Force
          $dir = Get-ChildItem "$env:ProgramFiles\nats-server" -Directory | Select-Object -First 1
          echo "$($dir.FullName)" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Enable Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1.13.0

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          modules: 'qtcharts'
          cache: true

      - name: Generate postgres password
        id: pg_password
        shell: bash
        run: |
          PG_PASS="$(openssl rand -base64 24 | tr -dc 'a-zA-Z0-9')"
          echo "admin_password=${PG_PASS}" >> $GITHUB_OUTPUT
          echo "PGPASSWORD=${PG_PASS}" >> $GITHUB_ENV

      - name: Setup postgres
        uses: ikalnytskyi/action-setup-postgres@v8
        with:
          username: postgres
          password: ${{ steps.pg_password.outputs.admin_password }}
          database: oresdb
          port: 5432
          postgres-version: "18"
        id: postgres

      - name: Install pgmq extension
        shell: bash
        run: |
          sharedir=$(pg_config --sharedir)
          extdir="${sharedir}/extension"
          pgmq_tmp=$(mktemp -d)
          git clone --depth=1 https://github.com/pgmq/pgmq.git "${pgmq_tmp}/pgmq"
          cd "${pgmq_tmp}/pgmq/pgmq-extension"
          version=$(grep "^default_version" pgmq.control | sed "s/.*= *'//;s/'//")
          cp "sql/pgmq.sql" "sql/pgmq--${version}.sql"
          cp pgmq.control "${extdir}/"
          cp sql/*.sql "${extdir}/"
          echo "pgmq ${version} installed to ${extdir}"

      - name: Init environment
        shell: bash
        env:
          ORES_DATABASE_NAME: ores_ci
          PGPASSWORD: ${{ steps.pg_password.outputs.admin_password }}
        run: |
          ./build/scripts/init-environment.sh -y
          grep -v '^[[:space:]]*#' .env | grep -v '^[[:space:]]*$' \
            | grep -v 'ORES_IAM_SERVICE_JWT_PRIVATE_KEY' >> $GITHUB_ENV

      - name: Setup Database
        shell: bash
        run: |
          ./projects/ores.sql/recreate_database.sh -y -D ores_ci

      - name: get-cmake
        uses: lukka/get-cmake@v4.3.2

      - name: Cache vcpkg binary packages
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/vcpkg-cache
          key: vcpkg-${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja-

      - name: run-vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          doNotCache: false

      - name: Run CTest workflow
        run: |
          $env:VCPKG_DISABLE_SYSTEM_PACKAGE_CHECK=1
          $env:ORES_BUILD_PROVIDER="github"
          $env:ORES_BUILD_COMMIT="$env:GITHUB_SHA"
          $env:ORES_BUILD_NUMBER="$env:GITHUB_RUN_NUMBER"
          $env:ORES_BUILD_TIMESTAMP=Get-Date -format "yyyy/MM/dd HH:mm:ss"
          $preset="${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja"
          $cmake_args="build_group=Continuous,preset=$preset"
          ctest -VV --preset $preset --script "CTest.cmake,$cmake_args"

      - name: Show sccache statistics
        if: always()
        run: sccache --show-stats

      - name: Upload WiX log on failure
        if: failure() && matrix.compiler == 'msvc'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: wix-log-${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja
          path: ./build/output/${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja/_CPack_Packages/win64/WIX/wix.log
          if-no-files-found: ignore

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja
          path: ./build/output/${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja/packages/OreStudio-0.0.17-win64.*
