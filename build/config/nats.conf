# NATS server configuration for ORE Studio (mTLS enabled).
#
# Used by start-services.sh when ORES_NATS_TLS_ENABLED=true.
# Certificates are generated by build/scripts/generate_nats_certs.sh.

port: 4222

jetstream: enabled

tls {
  cert_file: "build/keys/nats/nats-server.crt"
  key_file:  "build/keys/nats/nats-server.key"
  ca_file:   "build/keys/nats/ca.crt"
  verify:    true   # require client certificates (mTLS)
  timeout:   5
}
