# yamllint disable rule:line-length
---
name: Canary Linux

env:
  VCPKG_BINARY_SOURCES: 'clear;files,${{ github.workspace }}/vcpkg-cache,readwrite'
  SCCACHE_DIR: '${{ github.workspace }}/.sccache'

# Invoked by pr.yml for code-class pull requests; the path tiering
# lives in its classifier rather than in trigger filters here.
on:  # yamllint disable-line rule:truthy
  workflow_call:

jobs:
  build:
    name: linux-gcc-debug-ninja
    concurrency:
      group: canary-${{github.ref}}-${{github.job}}
      cancel-in-progress: true
    runs-on: ubuntu-24.04
    environment: CI
    env:
      # Temporary: diagnosing near-zero sccache hit rate (story
      # canary_ctest_ignores_cancellation). Remove once resolved.
      SCCACHE_LOG: sccache=debug
      SCCACHE_ERROR_LOG: /tmp/sccache_debug.log
    steps:
      - name: Free disk space
        run: |
          echo "=== Disk space before cleanup ==="
          df -h
          # Language runtimes and SDKs not needed by this build
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /home/linuxbrew/.linuxbrew
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/share/miniconda
          sudo rm -rf /usr/share/miniconda3
          # Cloud CLIs
          sudo rm -rf /opt/az
          sudo rm -rf /opt/pipx/venvs/azure-cli
          sudo rm -rf /usr/lib/google-cloud-sdk
          sudo rm -rf /usr/share/google-cloud-sdk
          sudo rm -rf /usr/local/share/powershell
          # Browser bundles
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /usr/local/share/chrome_beta
          sudo rm -rf /opt/google/chrome
          # Pre-installed toolchain caches we don't use
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /opt/hostedtoolcache/Ruby
          sudo rm -rf /opt/hostedtoolcache/node
          sudo rm -rf /opt/hostedtoolcache/go
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/lib/node_modules
          # Snap packages
          sudo snap remove lxd 2>/dev/null || true
          sudo rm -rf /var/cache/snapd
          # Docker images
          sudo docker image prune --all --force || true
          # apt cache
          sudo apt-get clean
          echo "=== Disk space after cleanup ==="
          df -h

      - uses: actions/checkout@v7
        with:
          submodules: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Validate SQL Schema
        run: |
          pip install --quiet pystache
          ./projects/ores.sql/utility/validate_schemas.sh

      - name: Restore sccache
        uses: actions/cache/restore@v6
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-linux-gcc-debug-ninja

      - name: Ccache for gh actions
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          variant: sccache
          key: linux-gcc-debug-ninja
          max-size: 3000M
          save: false

      - name: Install dev packages
        run: ./projects/ores.compass/compass.sh env install-packages

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          modules: 'qtcharts'
          cache: true

      - name: Generate postgres password
        id: pg_password
        run: |
          PG_PASS="$(openssl rand -base64 24 | tr -dc 'a-zA-Z0-9')"
          echo "admin_password=${PG_PASS}" >> $GITHUB_OUTPUT
          echo "PGPASSWORD=${PG_PASS}" >> $GITHUB_ENV

      - name: Install PostgreSQL extensions
        run: |
          ./build/scripts/setup_postgres_extensions.sh --pg-version 18

      - name: Setup postgres
        uses: ikalnytskyi/action-setup-postgres@v8
        with:
          username: postgres
          password: ${{ steps.pg_password.outputs.admin_password }}
          database: oresdb
          port: 5432
          postgres-version: "18"
        id: postgres

      - name: Configure shared_preload_libraries
        run: |
          PGDATA="$RUNNER_TEMP/pgdata"
          echo "shared_preload_libraries = 'pg_cron,timescaledb'" >> "$PGDATA/postgresql.conf"
          pg_ctl restart --pgdata="$PGDATA" --wait

      - name: Init environment
        env:
          ORES_DATABASE_NAME: ores_ci
          PGPASSWORD: ${{ steps.pg_password.outputs.admin_password }}
        run: |
          ./projects/ores.compass/compass.sh --no-deps env configure -y
          grep -v '^[[:space:]]*#' .env | grep -v '^[[:space:]]*$' \
            | grep -v 'ORES_IAM_SERVICE_JWT_PRIVATE_KEY' >> $GITHUB_ENV

      - name: Setup Database
        run: |
          ./projects/ores.compass/compass.sh db recreate -y -D ores_ci

      - name: get-cmake
        uses: lukka/get-cmake@v4.3.4

      - name: Cache vcpkg binary packages
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/vcpkg-cache
          key: vcpkg-linux-gcc-debug-ninja-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-linux-gcc-debug-ninja-

      - name: run-vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          doNotCache: false

      - name: Restore cmake build cache
        uses: actions/cache/restore@v6
        with:
          path: build/output/linux-gcc-debug-ninja/projects
          key: cmake-build-linux-gcc-debug-ninja

      - name: Ensure modified source files will be rebuilt
        run: |
          git diff origin/main...HEAD --name-only 2>/dev/null \
            | grep -E '\.(cpp|hpp|h)$' \
            | while IFS= read -r f; do
                [ -f "$f" ] && touch "$f"
                [[ "$f" == *.cpp ]] && find build/output/linux-gcc-debug-ninja -name "${f##*/}.gcda" -delete 2>/dev/null || true
              done || true

      - name: Run CTest workflow
        run: |
          export CMAKE_BUILD_PARALLEL_LEVEL=$(nproc)
          export CTEST_PARALLEL_LEVEL=$(nproc)
          export PATH=${PATH}:/usr/sbin
          export ZIC=1
          export ORES_BUILD_PROVIDER="github"
          export ORES_BUILD_COMMIT="${GITHUB_SHA}"
          export ORES_BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          export ORES_BUILD_TIMESTAMP=`date "+%Y/%m/%d %H:%M:%S"`
          # PR URL for the CDash Notes (empty for non-PR invocations).
          export ORES_PR_URL="${{ github.event.pull_request.html_url }}"
          export preset=linux-gcc-debug-ninja
          export cmake_args="build_group=Canary,preset=${preset},code_coverage=1"
          ctest -VV --preset ${preset} --script "CTest.cmake,${cmake_args}"

      - name: Delete cmake cache entry
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method DELETE \
            "/repos/${{ github.repository }}/actions/caches?key=cmake-build-linux-gcc-debug-ninja" \
            || true

      - name: Save cmake build cache
        if: ${{ !cancelled() }}
        uses: actions/cache/save@v6
        with:
          path: build/output/linux-gcc-debug-ninja/projects
          key: cmake-build-linux-gcc-debug-ninja

      - name: Delete sccache entry
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method DELETE \
            "/repos/${{ github.repository }}/actions/caches?key=sccache-linux-gcc-debug-ninja" \
            || true

      - name: Save sccache
        if: ${{ !cancelled() }}
        uses: actions/cache/save@v6
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-linux-gcc-debug-ninja

      - name: Show sccache statistics
        if: always()
        run: sccache --show-stats

      - name: Show sccache debug log (temporary diagnostic)
        if: always()
        run: |
          echo "=== sccache debug log size ==="
          wc -l /tmp/sccache_debug.log 2>/dev/null || echo "no log file"
          echo "=== first 200 cache-miss reason lines ==="
          grep -i "cache miss\|hash key\|Should be a hit\|Computing hash" /tmp/sccache_debug.log 2>/dev/null | head -200 || true
