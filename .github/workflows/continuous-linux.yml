# yamllint disable rule:line-length
---
name: Continuous Linux

env:
  VCPKG_BINARY_SOURCES: 'clear;files,${{ github.workspace }}/vcpkg-cache,readwrite'
  SCCACHE_DIR: '${{ github.workspace }}/.sccache'

on:  # yamllint disable-line rule:truthy
  schedule:
    - cron: '0 */2 * * *'
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  guard:
    name: relevance-guard
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Check if code changed since last successful run
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "should_build=true" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            exit 0
          fi
          workflow_file=$(basename "${GITHUB_WORKFLOW_REF%%@*}")
          last_sha=$(gh api \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow_file}/runs?branch=main&status=success&per_page=1" \
            --jq '.workflow_runs[0].head_sha // empty')
          if [[ -z "$last_sha" ]]; then
            echo "No prior successful run — building"
            exit 0
          fi
          if [[ "$last_sha" == "$GITHUB_SHA" ]]; then
            echo "No new commits since last run — skipping"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          non_doc=$(git diff --name-only "$last_sha" "$GITHUB_SHA" \
            | { grep -vE '^(doc/|assets/|\.claude/|\.gemini/|projects/ores\.codegen/)' || true; } \
            | { grep -vE '\.(md|org)$' || true; } \
            | { grep -vE '^projects/([^/]*/)*modeling/' || true; })
          if [[ -n "$non_doc" ]]; then
            echo "Code changes found — building"
          else
            echo "Doc-only changes — skipping"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: guard
    if: needs.guard.outputs.should_build == 'true'
    name: ${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja
    concurrency:
      group: ci-${{github.ref}}-${{github.job}}-${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja
      cancel-in-progress: false
    runs-on: ubuntu-24.04
    environment: CI
    strategy:
      fail-fast: false
      matrix:
        name: [linux-gcc, linux-clang]
        buildtype: [debug, release]
        include:
          - name: linux-gcc
            family: linux
            compiler: gcc
          - name: linux-clang
            family: linux
            compiler: clang
    steps:
      - name: Free disk space
        run: |
          echo "=== Disk space before cleanup ==="
          df -h
          # Language runtimes and SDKs not needed by this build
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /home/linuxbrew/.linuxbrew
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/share/miniconda
          sudo rm -rf /usr/share/miniconda3
          # Cloud CLIs
          sudo rm -rf /opt/az
          sudo rm -rf /opt/pipx/venvs/azure-cli
          sudo rm -rf /usr/lib/google-cloud-sdk
          sudo rm -rf /usr/share/google-cloud-sdk
          sudo rm -rf /usr/local/share/powershell
          # Browser bundles
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /usr/local/share/chrome_beta
          sudo rm -rf /opt/google/chrome
          # Pre-installed toolchain caches we don't use
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /opt/hostedtoolcache/Ruby
          sudo rm -rf /opt/hostedtoolcache/node
          sudo rm -rf /opt/hostedtoolcache/go
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/lib/node_modules
          # Snap packages
          sudo snap remove lxd 2>/dev/null || true
          sudo rm -rf /var/cache/snapd
          # Docker images
          sudo docker image prune --all --force || true
          # apt cache
          sudo apt-get clean
          echo "=== Disk space after cleanup ==="
          df -h

      - uses: actions/checkout@v7
        with:
          submodules: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Validate SQL Schema
        run: |
          pip install --quiet pystache
          ./projects/ores.sql/utility/validate_schemas.sh

      - name: Install Clang
        uses: KyleMayes/install-llvm-action@v2
        if: ${{ matrix.compiler == 'clang' }}
        with:
          version: "19"
          arch: x64

      - name: Restore sccache
        uses: actions/cache/restore@v6
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja

      - name: Ccache for gh actions
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          variant: sccache
          key: ${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja
          max-size: 2500M
          save: false

      - name: Install dev packages
        run: ./projects/ores.compass/compass.sh env install-packages

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          modules: 'qtcharts'
          cache: true

      - name: Generate postgres password
        id: pg_password
        run: |
          PG_PASS="$(openssl rand -base64 24 | tr -dc 'a-zA-Z0-9')"
          echo "admin_password=${PG_PASS}" >> $GITHUB_OUTPUT
          echo "PGPASSWORD=${PG_PASS}" >> $GITHUB_ENV

      - name: Install PostgreSQL extensions
        run: |
          ./build/scripts/setup_postgres_extensions.sh --pg-version 18

      - name: Setup postgres
        uses: ikalnytskyi/action-setup-postgres@v8
        with:
          username: postgres
          password: ${{ steps.pg_password.outputs.admin_password }}
          database: oresdb
          port: 5432
          postgres-version: "18"
        id: postgres

      - name: Configure shared_preload_libraries
        run: |
          PGDATA="$RUNNER_TEMP/pgdata"
          echo "shared_preload_libraries = 'pg_cron,timescaledb'" >> "$PGDATA/postgresql.conf"
          pg_ctl restart --pgdata="$PGDATA" --wait

      - name: Init environment
        env:
          ORES_DATABASE_NAME: ores_ci
        run: |
          ./projects/ores.compass/compass.sh --no-deps env configure -y
          grep -v '^[[:space:]]*#' .env | grep -v '^[[:space:]]*$' \
            | grep -v 'ORES_IAM_SERVICE_JWT_PRIVATE_KEY' >> $GITHUB_ENV

      - name: Setup Database
        run: |
          ./projects/ores.compass/compass.sh db recreate -y -D ores_ci

      - name: get-cmake
        uses: lukka/get-cmake@v4.3.4

      - name: Cache vcpkg binary packages
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/vcpkg-cache
          key: vcpkg-${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja-

      - name: run-vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          doNotCache: false

      - name: Run CTest workflow
        run: |
          export CMAKE_BUILD_PARALLEL_LEVEL=$(nproc)
          export CTEST_PARALLEL_LEVEL=$(nproc)
          export PATH=${PATH}:/usr/sbin
          export ZIC=1
          export ORES_BUILD_PROVIDER="github"
          export ORES_BUILD_COMMIT="${GITHUB_SHA}"
          export ORES_BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          export ORES_BUILD_TIMESTAMP=`date "+%Y/%m/%d %H:%M:%S"`
          export preset=${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja
          export cmake_args="build_group=Continuous,preset=${preset}"
          if [[ "${{matrix.buildtype}}" == "debug" ]]; then
              cmake_args="${cmake_args},code_coverage=1"
          fi
          ctest -VV --preset ${preset} --script "CTest.cmake,${cmake_args}"

      - name: Delete sccache entry
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method DELETE \
            "/repos/${{ github.repository }}/actions/caches?key=sccache-${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja" \
            || true

      - name: Save sccache
        if: ${{ !cancelled() }}
        uses: actions/cache/save@v6
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja

      - name: Show sccache statistics
        if: always()
        run: sccache --show-stats

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja
          path: ./build/output/${{matrix.family}}-${{matrix.compiler}}-${{matrix.buildtype}}-ninja/packages/orestudio_0.0.22_amd64.deb
